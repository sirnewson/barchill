<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Audio Visualizer</title>
    <style>
        :root {
            --bg-color: #011111;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Segoe UI', 'Noto Sans', sans-serif;
            color: white;
        }

        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        #video-background iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) scale(1.15);
            object-fit: cover;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(1, 17, 17, 0.3) 0%, rgba(1, 17, 17, 0.85) 100%);
            z-index: -1;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #quote-container {
            position: absolute;
            top: 20%;
            width: 80%;
            max-width: 600px;
            text-align: center;
            z-index: 5;
            pointer-events: none;
        }

        #quote {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            font-style: italic;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        #ui {
            position: absolute;
            bottom: 15%;
            z-index: 10;
        }

        button {
            padding: 16px 40px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="video-background">
    <div id="player"></div>
</div>

<div id="overlay"></div>

<div id="container">
    <div id="quote-container">
        <div id="quote">Quiet the mind, and the soul will speak.</div>
    </div>

    <canvas id="visualizer"></canvas>
    
    <div id="ui">
        <button id="startBtn">Enter Zen State</button>
    </div>
</div>

<script>
    const quotes = [
        "Quiet the mind, and the soul will speak.",
        "Peace is every step.",
        "Be here now.",
        "The way is not in the sky. The way is in the heart.",
        "Nothing is permanent.",
        "Smile, breathe and go slowly.",
        "Where there is peace, there is joy.",
        "Do not dwell in the past, do not dream of the future."
    ];

    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%',
            videoId: 'KOYluM3LAWU',
            playerVars: { 
                'autoplay': 0, 
                'controls': 0, 
                'loop': 1, 
                'playlist': 'KOYluM3LAWU', 
                'mute': 0,
                'modestbranding': 1,
                'rel': 0,
                'showinfo': 0
            },
        });
    }

    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const quoteEl = document.getElementById('quote');

    let audioCtx, analyser, dataArray, isInitialized = false;

    // Sparkle Particles
    const particles = [];
    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.4;
            this.vy = (Math.random() - 0.5) * 0.4;
            this.size = Math.random() * 2 + 0.3;
            this.alpha = Math.random() * 0.4 + 0.1;
            this.life = Math.random() * 100 + 150;
        }
        update(intensity) {
            this.x += this.vx * (1 + intensity * 8);
            this.y += this.vy * (1 + intensity * 8);
            this.life -= 0.3;
            if (this.life <= 0) this.reset();
        }
        draw(ctx) {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    const barConfigs = [
        { gradient: ['#FFF8E1', '#E6B0AA'], glow: 'rgba(230, 176, 170, 0.7)' },
        { gradient: ['#F7DC6F', '#F39C12'], glow: 'rgba(243, 156, 18, 0.7)' },
        { gradient: ['#58D68D', '#239B56'], glow: 'rgba(35, 155, 86, 0.7)' },
        { gradient: ['#EC7063', '#7B241C'], glow: 'rgba(236, 112, 99, 0.7)' }
    ];

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);
    resize();

    async function init() {
        if (isInitialized) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.85;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            if (player) player.playVideo();
            startBtn.style.display = 'none';
            isInitialized = true;
            
            quoteEl.style.opacity = 0.8;
            setInterval(() => {
                quoteEl.style.opacity = 0;
                setTimeout(() => {
                    quoteEl.innerText = quotes[Math.floor(Math.random()*quotes.length)];
                    quoteEl.style.opacity = 0.8;
                }, 2000);
            }, 8000);

            draw();
        } catch (err) { alert("Mic access needed!"); }
    }

    startBtn.addEventListener('click', init);

    const currentHeights = [0, 0, 0, 0];
    let globalIntensity = 0;

    function draw() {
        requestAnimationFrame(draw);
        analyser.getByteFrequencyData(dataArray);
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const w = window.innerWidth;
        const h = window.innerHeight;
        const barW = Math.min(75, w / 7);
        const gap = barW * 0.45;
        const startX = (w - ((barW * 4) + (gap * 3))) / 2;
        const centerY = h / 2;

        for (let p of particles) {
            p.update(globalIntensity);
            p.draw(ctx);
        }

        const bands = [4, 12, 25, 45]; 
        let sum = 0;

        for (let i = 0; i < 4; i++) {
            const val = dataArray[bands[i]] / 255;
            sum += val;
            const target = (barW * 2.2) + (val * h * 0.55 * (1.5 + i * 0.3));
            currentHeights[i] += (target - currentHeights[i]) * 0.15;

            const bH = currentHeights[i];
            const x = startX + (i * (barW + gap));
            const y = centerY - (bH / 2);

            ctx.shadowBlur = 40 + (val * 60);
            ctx.shadowColor = barConfigs[i].glow;
            
            const grad = ctx.createLinearGradient(x, y, x, y + bH);
            grad.addColorStop(0, barConfigs[i].gradient[0]);
            grad.addColorStop(1, barConfigs[i].gradient[1]);
            ctx.fillStyle = grad;
            
            ctx.beginPath();
            ctx.roundRect(x, y, barW, bH, barW / 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        globalIntensity = sum / 4;
    }
</script>
</body>
</html>
